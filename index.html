<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuIAN — твоя нейросеть</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 20% 50%, #0a0a2a, #010110);
            min-height: 100vh;
            color: white;
        }
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
        }
        .hero h1 {
            font-size: 72px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero p { color: #aaa; margin-top: 10px; }
        
        .chat-container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 500px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .message.bot .message-content {
            background: rgba(255,255,255,0.1);
            color: #e0e0e0;
        }
        .chat-input {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            display: flex;
            gap: 12px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            outline: none;
        }
        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
        .status {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .status.ready { color: #27c93f; }
        .status.error { color: #ff5f56; }
        .status.loading { color: #ffbd2e; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            width: fit-content;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .download-section {
            text-align: center;
            padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            margin: 0 10px;
        }
        .download-btn:hover {
            transform: scale(1.05);
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>RuIAN</h1>
        <p>Своя нейросеть. С нуля. Без чужих моделей.</p>
    </div>

    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">🧠 Я RuIAN — нейросеть, созданная с нуля. Запусти сервер на своём ПК и общайся!</div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Спроси RuIAN..." onkeypress="if(event.key==='Enter') sendMessage()" disabled>
            <button onclick="sendMessage()" id="sendBtn" disabled>📤 Отправить</button>
        </div>
        <div class="status loading" id="status">⚙️ Ожидание подключения к RuIAN...</div>
    </div>

    <div class="download-section">
        <button class="download-btn" onclick="downloadRuIAN()">📦 Скачать RuIAN для Windows</button>
        <a href="https://github.com/qoxfdcyd2654/ruian" class="download-btn">🐙 GitHub</a>
    </div>
    <div class="footer">
        <p>RuIAN — твоя нейросеть. Сделано с ❤️ для локального ИИ.</p>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        
        function downloadRuIAN() {
            // Ссылка на установщик в репозитории
            window.location.href = 'https://raw.githubusercontent.com/qoxfdcyd2654/ruian/main/downloads/RuIAN_Setup.bat';
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage('user', text);
            input.value = '';
            
            showTyping();
            
            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                hideTyping();
                addMessage('bot', data.response);
            } catch(e) {
                hideTyping();
                addMessage('bot', '❌ RuIAN не запущен. Скачай и запусти RuIAN на свой компьютер.');
                document.getElementById('status').innerHTML = '❌ Нейросеть не запущена';
                document.getElementById('status').className = 'status error';
            }
        }
        
        function addMessage(sender, text) {
            const messagesDiv = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
            document.getElementById('chatMessages').appendChild(typingDiv);
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function checkStatus() {
            try {
                const res = await fetch(`${API_URL}/status`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('status').innerHTML = `✅ RuIAN активен | Знаний: ${data.knowledge_size}`;
                    document.getElementById('status').className = 'status ready';
                    document.getElementById('messageInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                } else {
                    throw new Error();
                }
            } catch(e) {
                document.getElementById('status').innerHTML = '⚠️ RuIAN не запущен. Скачай и запусти.';
                document.getElementById('status').className = 'status error';
                document.getElementById('messageInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
            }
        }
        
        setInterval(checkStatus, 3000);
        checkStatus();
    </script>
</body>
</html>
